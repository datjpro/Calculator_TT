<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator CI Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <p class="eyebrow">GitHub Actions Demo</p>
        <h1>Calculator</h1>
        <p class="intro">
          Ung dung calculator don gian de demo quy trinh CI/CD voi unit tests.
        </p>

        <form class="calculator-form" data-form>
          <label>
            So thu nhat
            <input type="number" name="firstNumber" value="2" required />
          </label>

          <label>
            Phep toan
            <select name="operation">
              <option value="add">Cong (+)</option>
              <option value="subtract">Tru (-)</option>
              <option value="multiply">Nhan (*)</option>
              <option value="divide">Chia (/)</option>
            </select>
          </label>

          <label>
            So thu hai
            <input type="number" name="secondNumber" value="3" required />
          </label>

          <button type="submit">Tinh ket qua</button>
        </form>

        <p class="result" data-result>Ket qua: 5</p>
        <p class="error" data-error></p>
      </section>
    </main>

    <script src="calculator.js"></script>
    <script src="app.js"></script>
  </body>
</html>
